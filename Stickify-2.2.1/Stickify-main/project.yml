name: Stickify
options:
  bundleIdPrefix: com.sirius
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 2P8G67QD3N
targets:
  Stickify:
    type: application
    platform: iOS
    sources:
      - Stickify
    resources:
      - Stickify/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sirius.Stickify
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Stickify uses the camera to capture objects and cut them into on-device stickers."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Stickify saves exported stickers and captured originals to your photo library when you choose to keep them."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Stickify lets you choose photos to turn objects into on-device stickers."
        TARGETED_DEVICE_FAMILY: "1"
  StickifyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StickifyTests
    resources:
      - StickifyTests/Fixtures
    dependencies:
      - target: Stickify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sirius.StickifyTests
        GENERATE_INFOPLIST_FILE: YES
